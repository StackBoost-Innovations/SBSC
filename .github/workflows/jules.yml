name: Jules AI Integration

on:
  workflow_dispatch:      # Manual "Run workflow" button
  issue_comment:          # Responds to @jules in PRs
    types: [created]

env:
  # Opts into Node 24 for 2026 compatibility
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  jules_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Invoke Jules
        # This is the official Google Labs production repo
        uses: google-labs-code/jules-action@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
