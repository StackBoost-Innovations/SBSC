name: Jules AI Integration

on:
  workflow_dispatch:      # Creates the "Invoke" button in Actions
  issue_comment:          # Allows Jules to respond to @jules comments
    types: [created]

env:
  # Opts into Node 24 to suppress the warning if the runner allows it
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  jules_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Invoke Jules
        # Switched to the official Google Labs production action
        uses: google-labs-code/jules-action@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
