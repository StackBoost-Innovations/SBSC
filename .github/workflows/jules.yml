name: Jules AI Integration
on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  jules_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Jules Invoke
        uses: BeksOmega/jules-action@v1.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prompt: "Initialize repository."

      - name: Jules PR Comment
        uses: BeksOmega/jules-publish@v1.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Feedback to Jules
        uses: BeksOmega/jules-comms@v1.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
