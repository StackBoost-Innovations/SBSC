name: Jules AI Integration

on:
  workflow_dispatch:      # This creates the "Invoke" button in the Actions tab
  issue_comment:          # This allows Jules to respond to PR comments
    types: [created]

jobs:
  jules_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Jules Invoke
        uses: BeksOmega/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Jules PR Comment
        uses: BeksOmega/jules-publish@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Send Feedback to Jules
        uses: BeksOmega/jules-comms@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
