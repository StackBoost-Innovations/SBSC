name: Jules AI Integration

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

env:
  # This fixes the Node.js 20 deprecation warning you are seeing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  jules_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Invoke Jules
        # Use the official Google Labs production action
        uses: google-labs-code/jules-action@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
